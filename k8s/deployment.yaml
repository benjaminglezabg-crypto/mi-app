apiVersion: apps/v1
kind: Deployment
metadata:
  name: mi-app
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mi-app
  template:
    metadata:
      labels:
        app: mi-app
    spec:
      containers:
        - name: mi-app
          image: 597080429808.dkr.ecr.us-east-1.amazonaws.com/mi-app:latest
          ports:
            - containerPort: 80
