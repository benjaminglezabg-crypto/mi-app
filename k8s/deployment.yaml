apiVersion: apps/v1
kind: Deployment
metadata:
  name: mi-app
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mi-app
  template:
    metadata:
      labels:
        app: mi-app
      annotations:
        pipeline-execution: "$EXECUTION_ID"
    spec:
      containers:
        - name: mi-app
          image: "$IMAGE_URI@$IMAGE_DIGEST"
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: mi-app
  namespace: default
spec:
  selector:
    app: mi-app
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
