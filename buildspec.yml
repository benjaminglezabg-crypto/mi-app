version: 0.2

env:
  variables:
    TF_VERSION: "1.9.8"

phases:
  install:
    commands:
      - curl -fsSLo /tmp/terraform.zip "https://releases.hashicorp.com/terraform/${TF_VERSION}/terraform_${TF_VERSION}_linux_amd64.zip"
      - mkdir -p /tmp/terraform-bin
      - unzip -o /tmp/terraform.zip -d /tmp/terraform-bin
      - mv /tmp/terraform-bin/terraform /usr/local/bin/terraform
      - chmod +x /usr/local/bin/terraform
      - terraform version

  pre_build:
    commands:
      - cd terraform
      - terraform init -reconfigure

  build:
    commands:
      - terraform plan -destroy -out=destroyplan
      - terraform apply -auto-approve destroyplan
