version: 0.2

env:
  variables:
    AWS_DEFAULT_REGION: "us-east-1"
    ECR_REPOSITORY: "mi-app"

phases:
  pre_build:
    commands:
      - echo "Logging in to Amazon ECR..."
      - ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
      - REPOSITORY_URI=$ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$ECR_REPOSITORY
      - IMAGE_TAG=$(echo "$CODEBUILD_RESOLVED_SOURCE_VERSION" | cut -c 1-7)
      - aws ecr get-login-password --region "$AWS_DEFAULT_REGION" | docker login --username AWS --password-stdin "$REPOSITORY_URI"

  build:
    commands:
      - echo "Building Docker image..."
      - docker build -t "$ECR_REPOSITORY:$IMAGE_TAG" .
      - docker tag "$ECR_REPOSITORY:$IMAGE_TAG" "$REPOSITORY_URI:$IMAGE_TAG"

  post_build:
    commands:
      - echo "Pushing Docker image..."
      - docker push "$REPOSITORY_URI:$IMAGE_TAG"
      - echo "Updating Kubernetes deployment..."
      - sed -i "s|IMAGE_URI|$REPOSITORY_URI:$IMAGE_TAG|g" k8s/deployment.yaml
      - cat k8s/deployment.yaml

artifacts:
  files:
    - "k8s/**/*"
